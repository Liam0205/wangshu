name: ci

on:
  push:
    branches: [master]
    tags: ['v*']
    paths-ignore: ['docs/**', 'llmdoc/**', '.claude/**', '**.md']
  pull_request:
    paths-ignore: ['docs/**', 'llmdoc/**', '.claude/**', '**.md']

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v9

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      # -race 是硬门禁(经评审定稿,engineering.md §3.1)
      - run: go test -race -coverprofile=coverage.out -covermode=atomic ./...
      # benchmarks 子模块(独立 go.mod;gopher-lua 仅基准用,不污染主模块依赖图)。
      # realworld 的 oracle parity 是真测试,必须随 CI 跑;oracle 在 difftest job
      # 同步装,这里需要时单独装一次。
      - run: sudo apt-get update && sudo apt-get install -y lua5.1
      - run: cd benchmarks && go test -race ./...
      # 交叉编译冒烟:项目承诺「不依赖 cgo,保持交叉编译能力」,32 位
      # GOARCH 的 int 宽度差异曾导致编译失败而 amd64 门禁抓不到
      - run: GOOS=linux GOARCH=386 go build ./...
      - run: GOOS=windows GOARCH=amd64 go build ./...
      - run: GOOS=darwin GOARCH=arm64 go build ./...
      - uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out
          retention-days: 30

  fuzz-smoke:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: ./scripts/go-fuzz.sh 30s

  conformance:
    # M5/M9 后启用实际用例;占位 job 保持绿(test/conformance 空包时 go test 直接过)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: make conformance

  difftest:
    # M14 启用差分 fuzz;此前只校验 oracle 供给路径
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: sudo apt-get update && sudo apt-get install -y lua5.1
      - run: make difftest
      - if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: difftest-failure
          path: test/difftest/testdata/
          if-no-files-found: ignore

  golden-diff-guard:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: highlight golden/exemption changes
        run: |
          git diff --name-only "origin/${{ github.base_ref }}" -- \
            'test/conformance/golden/**' '**/exemptions*' | tee changed-golden.txt
          if [ -s changed-golden.txt ]; then
            {
              echo "## ⚠ golden / 豁免清单有改动,请 reviewer 显式确认(防掩盖真 bug,12 §8)"
              cat changed-golden.txt
            } >> "$GITHUB_STEP_SUMMARY"
          fi
