name: ci

on:
  push:
    branches: [master]
    tags: ['v*']
    paths-ignore: ['docs/**', 'llmdoc/**', '.claude/**', '**.md']
  pull_request:
    paths-ignore: ['docs/**', 'llmdoc/**', '.claude/**', '**.md']

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v9

  # **F3-#3c tri-platform matrix** (2026-06-30): following the user decision
  # that arm64 and amd64 have equal standing, all four big jobs
  # (test/difftest/conformance/fuzz-smoke) gained an os matrix dimension
  # (linux/amd64 + linux/arm64 ubuntu-24.04-arm + darwin/arm64 macos-latest).
  # The three platforms run in parallel; wall-clock is set by the slowest
  # (typically ~5 min); GHA is free for public repos. The old standalone
  # test-linux-arm64 / test-darwin-arm64 jobs were removed (absorbed by the
  # matrix).
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # P1/P3/P4 x os run independently; one failure does not block collecting the rest
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
        variant: [p1, p3, p4]
        include:
          - variant: p1
            tags: ''
            cov_prefix: coverage-p1
          - variant: p3
            tags: 'wangshu_p3 wangshu_profile'
            cov_prefix: coverage-p3
          - variant: p4
            tags: 'wangshu_p4 wangshu_profile'
            cov_prefix: coverage-p4
    name: test (${{ matrix.variant }} / ${{ matrix.os }})
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      # -race is a hard gate (finalized in review, engineering.md §3.1)
      # All three platforms run -race the same way, arm64 included (F3-#3c:
      # the trampoline LR-slot bug fixed in that PR is the prototype of a
      # concurrency-shaped issue; arm64 -race may catch a future bug of the
      # same kind)
      - name: go test (${{ matrix.variant }} / ${{ matrix.os }})
        run: |
          if [ -n "${{ matrix.tags }}" ]; then
            go test -race -tags "${{ matrix.tags }}" \
              -coverprofile=${{ matrix.cov_prefix }}-${{ matrix.os }}.out \
              -covermode=atomic ./...
          else
            go test -race \
              -coverprofile=${{ matrix.cov_prefix }}-${{ matrix.os }}.out \
              -covermode=atomic ./...
          fi
      # The benchmarks submodule used to run functional tests (realworld
      # oracle parity) only under the p1 build; gibbous benchmarks are
      # covered by `make bench-p3` locally / nightly-benchmark (future CI).
      # **lua 5.1.5 oracle install**: ubuntu installs via apt directly
      # (5.1.5 exists for both arm64 and amd64); macOS homebrew deprecated
      # the lua@5.1 formula in 2024 (only lua@5.4 remains), so 5.1.5 is
      # built from source (7 MB tarball, ~10s compile).
      # **Cache strategy**: cache the lua-5.1.5 build output directory
      # (build artifact + bin/lua); after restore, sudo make install copies
      # binary + headers + lib into /usr/local/ (install is a cp, ~0.1s),
      # then ln -sf the standard entry name lua5.1. The cache key includes
      # runner.os + runner.arch + the lua version, reusable across runner
      # images.
      #
      # **All three variants need the lua5.1 oracle**: benchmarks/realworld
      # runs oracle parity under p1/p3/p4 alike (TestRealWorld_OracleParity
      # has no build tag and appears in every variant's benchmarks submodule
      # test set). The old `matrix.variant == 'p1'` guard made p3/p4 skip
      # the lua5.1 install + benchmarks tests => real bugs like the
      # binarytrees P3 promotion bug went uncaught in CI for a long time
      # (discovered 2026-06-30).
      - if: startsWith(matrix.os, 'macos')
        id: cache-lua51-test
        uses: actions/cache@v6
        with:
          path: lua-5.1.5
          key: lua-5.1.5-build-${{ runner.os }}-${{ runner.arch }}
      - if: startsWith(matrix.os, 'ubuntu')
        run: sudo apt-get update && sudo apt-get install -y lua5.1
      - if: startsWith(matrix.os, 'macos') && steps.cache-lua51-test.outputs.cache-hit != 'true'
        # cache miss: download + build
        run: |
          curl -fsSL https://www.lua.org/ftp/lua-5.1.5.tar.gz | tar xz
          cd lua-5.1.5
          make macosx CC=cc
      - if: startsWith(matrix.os, 'macos')
        # install + symlink runs on both cache hit and miss (install is a cp, safe to repeat)
        run: |
          cd lua-5.1.5
          sudo make install INSTALL_TOP=/usr/local INSTALL_BIN=/usr/local/bin INSTALL_INC=/usr/local/include INSTALL_LIB=/usr/local/lib INSTALL_MAN=/usr/local/share/man/man1
          sudo ln -sf /usr/local/bin/lua /usr/local/bin/lua5.1
          lua5.1 -v
      # The benchmarks/ submodule runs under all three variants (with the
      # matching build tags) so parity/perf tests like bench-realworld /
      # bench-heavy / bench-baseline are CI-gated under p3/p4 builds too
      # (skipping this step was the root cause of the long-unreported
      # binarytrees P3 promotion bug).
      - if: matrix.tags == ''
        run: cd benchmarks && go test -race ./...
      - if: matrix.tags != ''
        run: cd benchmarks && go test -race -tags "${{ matrix.tags }}" ./...
      # Cross-compile smoke (linux/amd64 only; OS-independent, one signal
      # for cross-platform compilability is enough). The project promises
      # "no cgo dependency, cross-compilation preserved"; int-width
      # differences on 32-bit GOARCH once broke the build in ways the amd64
      # gate could not catch. The P4 cross build covers darwin/arm64 +
      # linux/arm64 to verify the wangshu_p4 build tag compiles across
      # architectures.
      - if: matrix.variant == 'p1' && matrix.os == 'ubuntu-latest'
        run: GOOS=linux GOARCH=386 go build ./...
      - if: matrix.variant == 'p1' && matrix.os == 'ubuntu-latest'
        run: GOOS=windows GOARCH=amd64 go build ./...
      - if: matrix.variant == 'p1' && matrix.os == 'ubuntu-latest'
        run: GOOS=darwin GOARCH=arm64 go build ./...
      - if: matrix.variant == 'p4' && matrix.os == 'ubuntu-latest'
        run: GOOS=linux GOARCH=arm64 go build -tags 'wangshu_p4 wangshu_profile' ./...
      - if: matrix.variant == 'p4' && matrix.os == 'ubuntu-latest'
        run: GOOS=darwin GOARCH=arm64 go build -tags 'wangshu_p4 wangshu_profile' ./...
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.cov_prefix }}-${{ matrix.os }}
          path: ${{ matrix.cov_prefix }}-${{ matrix.os }}.out
          retention-days: 30

  fuzz-smoke:
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # P1/P3/P4 x os fuzz independently
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
        variant: [p1, p3, p4]
    name: fuzz-smoke (${{ matrix.variant }} / ${{ matrix.os }})
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: make fuzz-${{ matrix.variant }}
      # **F3-#3c PR #28**: on fuzz failure, upload the failing inputs under
      # testdata/fuzz/ (go test writes there by default, both after the
      # minimizer finishes and on hang) so later reproduction + fixing has
      # the concrete input. retention-days 30 matches difftest.
      - if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-failure-${{ matrix.variant }}-${{ matrix.os }}
          path: testdata/fuzz/
          if-no-files-found: ignore
          retention-days: 30

  # cgo oracle smoke (engineering.md §1; design notes in the
  # internal/oracle package godocs): the process-embedded official Lua
  # 5.1.5 differential oracle is the repo's only cgo surface (the
  # default build stays zero-cgo). PR gate checks: package builds,
  # shim unit tests pass, FuzzOracleDiff runs a clean short round.
  # The long run lives in the nightly-diff-fuzz p1 leg. Two platforms
  # (linux/amd64 + linux/arm64): nightly runs ubuntu-latest only, so
  # arm64 here surfaces C-side endianness/ABI surprises early.
  oracle-smoke:
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
    name: oracle-smoke (${{ matrix.os }})
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: oracle shim unit tests
        run: CGO_ENABLED=1 go test -tags wangshu_oracle_cgo ./internal/oracle/ -count=1
      - name: FuzzOracleDiff required-target assertion
        # The smoke must fail loudly if the target stops compiling into
        # the root package under the oracle tags (PR review: go-fuzz.sh
        # would otherwise skip it while other targets keep the job green).
        run: |
          CGO_ENABLED=1 go test -tags wangshu_oracle_cgo . -run='^$' -list '^FuzzOracleDiff$' | grep -q '^FuzzOracleDiff$' \
            || { echo "FuzzOracleDiff missing under wangshu_oracle_cgo (build tag broken?)" >&2; exit 1; }
      - name: oracle diff fuzz smoke
        # FuzzOracleDiff filter: build tags are additive, so without it
        # the sweep re-runs every default-build target too (5 x 60s) --
        # the default-build targets already get their smoke in the
        # fuzz-smoke matrix above.
        run: CGO_ENABLED=1 ./scripts/go-fuzz.sh 60s "wangshu_oracle_cgo" FuzzOracleDiff
      - if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: oracle-fuzz-failure-${{ matrix.os }}
          path: testdata/fuzz/
          if-no-files-found: ignore
          retention-days: 30

  conformance:
    # Real cases enabled after M5/M9; the placeholder job stayed green
    # (go test passes on an empty test/conformance package).
    # Matrix coverage: p1 = crescent interpreter path; p3 = gibbous
    # post-promotion path; p4 = JIT post-promotion path, x three platforms
    # (linux/amd64 + linux/arm64 + darwin/arm64) for cross-platform
    # consistency
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
        variant: [p1, p3, p4]
    name: conformance (${{ matrix.variant }} / ${{ matrix.os }})
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: make conformance-${{ matrix.variant }}

  difftest:
    # Differential fuzz enabled at M14; before that only the oracle supply
    # path was validated.
    # Matrix coverage: p1/p3/p4 (the V1-V13 three-way byte-equal acceptance
    # bar) x three platforms.
    # Needs the lua5.1 binary oracle (check-oracle.sh strictly verifies
    # version 5.1.5)
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
        variant: [p1, p3, p4]
    name: difftest (${{ matrix.variant }} / ${{ matrix.os }})
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - if: startsWith(matrix.os, 'macos')
        id: cache-lua51-difftest
        uses: actions/cache@v6
        with:
          path: lua-5.1.5
          key: lua-5.1.5-build-${{ runner.os }}-${{ runner.arch }}
      - if: startsWith(matrix.os, 'ubuntu')
        run: sudo apt-get update && sudo apt-get install -y lua5.1
      - if: startsWith(matrix.os, 'macos') && steps.cache-lua51-difftest.outputs.cache-hit != 'true'
        # cache miss: download + build (macOS homebrew deprecated lua@5.1 in 2024)
        run: |
          curl -fsSL https://www.lua.org/ftp/lua-5.1.5.tar.gz | tar xz
          cd lua-5.1.5
          make macosx CC=cc
      - if: startsWith(matrix.os, 'macos')
        # install + symlink (install is a cp, safe to repeat; runs on both cache hit and miss)
        run: |
          cd lua-5.1.5
          sudo make install INSTALL_TOP=/usr/local INSTALL_BIN=/usr/local/bin INSTALL_INC=/usr/local/include INSTALL_LIB=/usr/local/lib INSTALL_MAN=/usr/local/share/man/man1
          sudo ln -sf /usr/local/bin/lua /usr/local/bin/lua5.1
      - run: make difftest-${{ matrix.variant }}
      - if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: difftest-failure-${{ matrix.variant }}-${{ matrix.os }}
          path: test/difftest/testdata/
          if-no-files-found: ignore

  golden-diff-guard:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: highlight golden/exemption changes
        run: |
          git diff --name-only "origin/${{ github.base_ref }}" -- \
            'test/conformance/golden/**' '**/exemptions*' | tee changed-golden.txt
          if [ -s changed-golden.txt ]; then
            {
              echo "## ⚠ golden / 豁免清单有改动,请 reviewer 显式确认(防掩盖真 bug,12 §8)"
              cat changed-golden.txt
            } >> "$GITHUB_STEP_SUMMARY"
          fi
