name: ci

on:
  push:
    branches: [master]
    tags: ['v*']
    paths-ignore: ['docs/**', 'llmdoc/**', '.claude/**', '**.md']
  pull_request:
    paths-ignore: ['docs/**', 'llmdoc/**', '.claude/**', '**.md']

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v9

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # P1 / P3 / P4 独立跑,一个失败不阻塞另一个收集
      matrix:
        include:
          - variant: p1
            tags: ''
            cov_name: coverage-p1.out
          - variant: p3
            tags: 'wangshu_p3 wangshu_profile'
            cov_name: coverage-p3.out
          - variant: p4
            tags: 'wangshu_p4 wangshu_profile'
            cov_name: coverage-p4.out
    name: test (${{ matrix.variant }})
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      # -race 是硬门禁(经评审定稿,engineering.md §3.1)
      # 矩阵覆盖:p1 = 新月解释器路径;p3 = 凸月升层 wasm 路径
      # coverage 走原生 go test(coverage profile 合并 binary 模式复杂,不上 binary 流)
      - name: go test (${{ matrix.variant }})
        run: |
          if [ -n "${{ matrix.tags }}" ]; then
            go test -race -tags "${{ matrix.tags }}" -coverprofile=${{ matrix.cov_name }} -covermode=atomic ./...
          else
            go test -race -coverprofile=${{ matrix.cov_name }} -covermode=atomic ./...
          fi
      # benchmarks 子模块只在 p1 build 跑功能测试(realworld oracle parity);
      # 凸月 benchmark 由本仓 `make bench-p3`(本地)/ nightly-benchmark(未来 CI)覆盖
      - if: matrix.variant == 'p1'
        run: sudo apt-get update && sudo apt-get install -y lua5.1
      - if: matrix.variant == 'p1'
        run: cd benchmarks && go test -race ./...
      # 交叉编译冒烟:项目承诺「不依赖 cgo,保持交叉编译能力」,32 位
      # GOARCH 的 int 宽度差异曾导致编译失败而 amd64 门禁抓不到。
      # P4 build 加 darwin/arm64 + linux/arm64 cross 冒烟(arm64 后端代码
      # 路径 wangshu_p4 build 在 amd64 主机经 build tag 隔离不编译,但其它
      # GOARCH=arm64 必须能编;PJ8 arm64 emitter 字节编码也在 arm64 build
      # tag 下编译——CI cross 验)
      - if: matrix.variant == 'p1'
        run: GOOS=linux GOARCH=386 go build ./...
      - if: matrix.variant == 'p1'
        run: GOOS=windows GOARCH=amd64 go build ./...
      - if: matrix.variant == 'p1'
        run: GOOS=darwin GOARCH=arm64 go build ./...
      - if: matrix.variant == 'p4'
        run: GOOS=linux GOARCH=arm64 go build -tags 'wangshu_p4 wangshu_profile' ./...
      - if: matrix.variant == 'p4'
        run: GOOS=darwin GOARCH=arm64 go build -tags 'wangshu_p4 wangshu_profile' ./...
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.variant }}
          path: ${{ matrix.cov_name }}
          retention-days: 30

  # PJ9 双架构 CI:用 QEMU user-mode emulation 在 amd64 runner 跑 arm64 jit
  # 子包测试。承 06-backends.md §5「双架构 CI 双跑」+ 08-testing-strategy.md
  # §6 —— 物理 arm64 self-hosted runner 留 PJ9+ 基础设施落地。
  #
  # **范围裁决**:本 job 只跑 jit/arm64 子包(emitter/codepage 字节级单测)
  # —— QEMU user-mode 不真模拟 i-cache(DC CVAU/IC IVAU 在 EL0 user mode 下
  # 是 NOP),也不真模拟 W^X 翻面后的 PROT_EXEC 取指,故 mmap+RX+execute
  # 路径(jit 主包 callJITFull + crescent e2e)在 QEMU 下 100% SIGSEGV
  # 不可信。emitter 字节编码 + codepage struct 一致性等纯计算路径在 QEMU
  # 可靠运行。真 arm64 端到端等物理 runner(承 06 §5.7「PJ8/9 可滞后真物理
  # runner」渐进交付)。
  test-arm64:
    runs-on: ubuntu-latest
    needs: test
    name: test-arm64 (p4 via QEMU)
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      # docker QEMU 装 binfmt_misc handlers 让 amd64 host 可执行 arm64 binary
      - name: Install QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static
      # 跑 jit/arm64 子包(纯字节编码 + codepage 一致性,无 mmap+RX 执行)
      - name: go test arm64 jit/arm64 子包(emitter 字节编码)
        run: |
          GOOS=linux GOARCH=arm64 go test -tags 'wangshu_p4 wangshu_profile' \
            ./internal/gibbous/jit/arm64/...

  # darwin/arm64 真物理 runner CI:用 GitHub Actions macos-latest(Apple
  # Silicon M1+)跑 P4 + jit/arm64 子包真物理 e2e。
  #
  # 承 tmp/wangshu-p4-todo.md §三 darwin/arm64 W^X 真实装(方案 A)+
  # 06-backends.md §5.7「双架构 CI 双跑」+ 08-testing-strategy.md §6。
  #
  # **关键技术约束**:
  #   - macos-latest = arm64 (Apple Silicon),public repo 免费(private 10x 计费)
  #   - JIT entitlement:`go test` 子进程默认允许 MAP_JIT + pthread_jit_write_protect_np
  #     (Hardened Runtime + codesign 在 `go test` 通常不强制)
  #   - cgo 必须启用:codepage_darwin.go build tag 严格 `wangshu_p4 && darwin
  #     && arm64 && cgo`,CGO_ENABLED=0 cross-build 走 codepage_other.go stub
  #
  # **范围**:跑完整 ./... P4 build + jit/arm64 子包 + arm64 host 上经
  # archCallJITFull / archCallJITSpec 的真 mmap+RX+execute 路径。
  test-darwin-arm64:
    runs-on: macos-latest
    needs: test
    name: test-darwin-arm64 (p4 macos-latest M1)
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      # darwin/arm64 真 cgo 路径(codepage_darwin.go MAP_JIT + W^X 翻面 +
      # sys_icache_invalidate)。CGO_ENABLED=1 是 darwin runner 默认值。
      - name: go test darwin/arm64 p4 build (cgo enabled)
        run: |
          CGO_ENABLED=1 go test -tags 'wangshu_p4 wangshu_profile' ./...
      # jit/arm64 子包字节级单测 + 真 trampoline + 真 mmap+RX 路径
      - name: go test jit/arm64 子包(真 callJITFull / callJITSpec)
        run: |
          CGO_ENABLED=1 go test -tags 'wangshu_p4 wangshu_profile' \
            ./internal/gibbous/jit/arm64/...
      # P1 build(crescent 解释器)在 darwin/arm64 跑一次冒烟,确保 arm64 host
      # 上无 cgo 路径仍跑通
      - name: go test darwin/arm64 p1 build (cgo disabled)
        run: |
          CGO_ENABLED=0 go test ./...

  fuzz-smoke:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # P1 / P3 / P4 独立 fuzz,一个失败不阻塞另一个收集
      matrix:
        include:
          - variant: p1
          - variant: p3
          - variant: p4
    name: fuzz-smoke (${{ matrix.variant }})
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: make fuzz-${{ matrix.variant }}

  conformance:
    # M5/M9 后启用实际用例;占位 job 保持绿(test/conformance 空包时 go test 直接过)
    # 矩阵覆盖:p1 = 新月解释器路径;p3 = 凸月升层后路径;p4 = JIT 升层后路径
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: p1
          - variant: p3
          - variant: p4
    name: conformance (${{ matrix.variant }})
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: make conformance-${{ matrix.variant }}

  difftest:
    # M14 启用差分 fuzz;此前只校验 oracle 供给路径
    # 矩阵覆盖:p1/p3/p4 三档(V1-V13 三方逐字节验收口径)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: p1
          - variant: p3
          - variant: p4
    name: difftest (${{ matrix.variant }})
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: sudo apt-get update && sudo apt-get install -y lua5.1
      - run: make difftest-${{ matrix.variant }}
      - if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: difftest-failure-${{ matrix.variant }}
          path: test/difftest/testdata/
          if-no-files-found: ignore

  golden-diff-guard:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: highlight golden/exemption changes
        run: |
          git diff --name-only "origin/${{ github.base_ref }}" -- \
            'test/conformance/golden/**' '**/exemptions*' | tee changed-golden.txt
          if [ -s changed-golden.txt ]; then
            {
              echo "## ⚠ golden / 豁免清单有改动,请 reviewer 显式确认(防掩盖真 bug,12 §8)"
              cat changed-golden.txt
            } >> "$GITHUB_STEP_SUMMARY"
          fi
