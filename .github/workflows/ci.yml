name: ci

on:
  push:
    branches: [master]
    tags: ['v*']
    paths-ignore: ['docs/**', 'llmdoc/**', '.claude/**', '**.md']
  pull_request:
    paths-ignore: ['docs/**', 'llmdoc/**', '.claude/**', '**.md']

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v9

  # **F3-#3c 三平台矩阵化**(2026-06-30):承用户「arm64 与 amd64 地位等同」
  # 决策,test/difftest/conformance/fuzz-smoke 四大 job 全部加 os 维度矩阵
  # (linux/amd64 + linux/arm64 ubuntu-24.04-arm + darwin/arm64 macos-latest)。
  # 三平台并行跑,wall-clock 由最慢平台决定(典型 ~5 min);public repo GHA
  # 免费。原独立 test-linux-arm64 / test-darwin-arm64 job 已删(被矩阵吸收)。
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # P1/P3/P4 × os 独立跑,一个失败不阻塞其它收集
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
        variant: [p1, p3, p4]
        include:
          - variant: p1
            tags: ''
            cov_prefix: coverage-p1
          - variant: p3
            tags: 'wangshu_p3 wangshu_profile'
            cov_prefix: coverage-p3
          - variant: p4
            tags: 'wangshu_p4 wangshu_profile'
            cov_prefix: coverage-p4
    name: test (${{ matrix.variant }} / ${{ matrix.os }})
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      # -race 是硬门禁(经评审定稿,engineering.md §3.1)
      # 三平台同款跑 -race,arm64 也跑(F3-#3c:本 PR 修的 trampoline LR slot
      # bug 是并发型问题原型,arm64 端 -race 可能抓同款未来 bug)
      - name: go test (${{ matrix.variant }} / ${{ matrix.os }})
        run: |
          if [ -n "${{ matrix.tags }}" ]; then
            go test -race -tags "${{ matrix.tags }}" \
              -coverprofile=${{ matrix.cov_prefix }}-${{ matrix.os }}.out \
              -covermode=atomic ./...
          else
            go test -race \
              -coverprofile=${{ matrix.cov_prefix }}-${{ matrix.os }}.out \
              -covermode=atomic ./...
          fi
      # benchmarks 子模块只在 p1 build 跑功能测试(realworld oracle parity);
      # 凸月 benchmark 由本仓 `make bench-p3`(本地)/ nightly-benchmark(未来 CI)覆盖
      # **lua 5.1.5 oracle 装**:ubuntu apt 直接装(arm64 + amd64 都有 5.1.5);
      # macOS homebrew 自 2024 年起已废弃 lua@5.1 formula(只剩 lua@5.4),
      # 故从源码编译 5.1.5(7 MB tarball,~10s 编译)。
      # **cache 策略**:缓 lua-5.1.5 编译产物目录(build artifact + bin/lua),
      # restore 后 sudo make install 把 binary + 头文件 + lib 装到 /usr/local/
      # (install 是 cp 操作 ~0.1s),并 ln -sf 标准入口名 lua5.1。
      # cache key 含 runner.os + runner.arch + lua 版本,跨 runner image 复用。
      - if: matrix.variant == 'p1' && startsWith(matrix.os, 'macos')
        id: cache-lua51-test
        uses: actions/cache@v4
        with:
          path: lua-5.1.5
          key: lua-5.1.5-build-${{ runner.os }}-${{ runner.arch }}
      - if: matrix.variant == 'p1' && startsWith(matrix.os, 'ubuntu')
        run: sudo apt-get update && sudo apt-get install -y lua5.1
      - if: matrix.variant == 'p1' && startsWith(matrix.os, 'macos') && steps.cache-lua51-test.outputs.cache-hit != 'true'
        # cache miss:下载 + 编译
        run: |
          curl -fsSL https://www.lua.org/ftp/lua-5.1.5.tar.gz | tar xz
          cd lua-5.1.5
          make macosx CC=cc
      - if: matrix.variant == 'p1' && startsWith(matrix.os, 'macos')
        # cache hit 或 miss 都跑 install + symlink(install 是 cp,可重复执行)
        run: |
          cd lua-5.1.5
          sudo make install INSTALL_TOP=/usr/local INSTALL_BIN=/usr/local/bin INSTALL_INC=/usr/local/include INSTALL_LIB=/usr/local/lib INSTALL_MAN=/usr/local/share/man/man1
          sudo ln -sf /usr/local/bin/lua /usr/local/bin/lua5.1
          lua5.1 -v
      - if: matrix.variant == 'p1'
        run: cd benchmarks && go test -race ./...
      # 交叉编译冒烟(只在 linux/amd64 跑,与 OS 无关,跨平台编译信号一次即可)。
      # 项目承诺「不依赖 cgo,保持交叉编译能力」,32 位 GOARCH 的 int 宽度差异
      # 曾导致编译失败而 amd64 门禁抓不到。P4 build cross 含 darwin/arm64 +
      # linux/arm64,验 wangshu_p4 build tag 跨架构编译。
      - if: matrix.variant == 'p1' && matrix.os == 'ubuntu-latest'
        run: GOOS=linux GOARCH=386 go build ./...
      - if: matrix.variant == 'p1' && matrix.os == 'ubuntu-latest'
        run: GOOS=windows GOARCH=amd64 go build ./...
      - if: matrix.variant == 'p1' && matrix.os == 'ubuntu-latest'
        run: GOOS=darwin GOARCH=arm64 go build ./...
      - if: matrix.variant == 'p4' && matrix.os == 'ubuntu-latest'
        run: GOOS=linux GOARCH=arm64 go build -tags 'wangshu_p4 wangshu_profile' ./...
      - if: matrix.variant == 'p4' && matrix.os == 'ubuntu-latest'
        run: GOOS=darwin GOARCH=arm64 go build -tags 'wangshu_p4 wangshu_profile' ./...
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.cov_prefix }}-${{ matrix.os }}
          path: ${{ matrix.cov_prefix }}-${{ matrix.os }}.out
          retention-days: 30

  fuzz-smoke:
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # P1/P3/P4 × os 独立 fuzz
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
        variant: [p1, p3, p4]
    name: fuzz-smoke (${{ matrix.variant }} / ${{ matrix.os }})
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: make fuzz-${{ matrix.variant }}
      # **F3-#3c PR #28**:fuzz fail 时上传 testdata/fuzz/ 失败 input
      # (go test 默认写到这里,minimizer 完成后或 hang 时都会落盘),让后续
      # 复现+修可以拿到具体输入。retention-days 30 与 difftest 同款。
      - if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-failure-${{ matrix.variant }}-${{ matrix.os }}
          path: testdata/fuzz/
          if-no-files-found: ignore
          retention-days: 30

  conformance:
    # M5/M9 后启用实际用例;占位 job 保持绿(test/conformance 空包时 go test 直接过)
    # 矩阵覆盖:p1 = 新月解释器路径;p3 = 凸月升层后路径;p4 = JIT 升层后路径
    # × 三平台(linux/amd64 + linux/arm64 + darwin/arm64),验跨平台一致
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
        variant: [p1, p3, p4]
    name: conformance (${{ matrix.variant }} / ${{ matrix.os }})
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: make conformance-${{ matrix.variant }}

  difftest:
    # M14 启用差分 fuzz;此前只校验 oracle 供给路径
    # 矩阵覆盖:p1/p3/p4 三档(V1-V13 三方逐字节验收口径)× 三平台
    # 需 lua5.1 二进制 oracle(check-oracle.sh 强校验版本 5.1.5)
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
        variant: [p1, p3, p4]
    name: difftest (${{ matrix.variant }} / ${{ matrix.os }})
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - if: startsWith(matrix.os, 'macos')
        id: cache-lua51-difftest
        uses: actions/cache@v4
        with:
          path: lua-5.1.5
          key: lua-5.1.5-build-${{ runner.os }}-${{ runner.arch }}
      - if: startsWith(matrix.os, 'ubuntu')
        run: sudo apt-get update && sudo apt-get install -y lua5.1
      - if: startsWith(matrix.os, 'macos') && steps.cache-lua51-difftest.outputs.cache-hit != 'true'
        # cache miss:下载 + 编译(macOS homebrew 自 2024 年起已废弃 lua@5.1)
        run: |
          curl -fsSL https://www.lua.org/ftp/lua-5.1.5.tar.gz | tar xz
          cd lua-5.1.5
          make macosx CC=cc
      - if: startsWith(matrix.os, 'macos')
        # install + symlink(install 是 cp,可重复执行;cache hit 或 miss 都跑)
        run: |
          cd lua-5.1.5
          sudo make install INSTALL_TOP=/usr/local INSTALL_BIN=/usr/local/bin INSTALL_INC=/usr/local/include INSTALL_LIB=/usr/local/lib INSTALL_MAN=/usr/local/share/man/man1
          sudo ln -sf /usr/local/bin/lua /usr/local/bin/lua5.1
      - run: make difftest-${{ matrix.variant }}
      - if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: difftest-failure-${{ matrix.variant }}-${{ matrix.os }}
          path: test/difftest/testdata/
          if-no-files-found: ignore

  golden-diff-guard:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: highlight golden/exemption changes
        run: |
          git diff --name-only "origin/${{ github.base_ref }}" -- \
            'test/conformance/golden/**' '**/exemptions*' | tee changed-golden.txt
          if [ -s changed-golden.txt ]; then
            {
              echo "## ⚠ golden / 豁免清单有改动,请 reviewer 显式确认(防掩盖真 bug,12 §8)"
              cat changed-golden.txt
            } >> "$GITHUB_STEP_SUMMARY"
          fi
