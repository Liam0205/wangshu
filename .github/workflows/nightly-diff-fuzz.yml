name: nightly-diff-fuzz

# 长跑差分 + 自动开 issue(engineering.md §3.2):
#   - PR 门禁(ci.yml)用固定种子防回归;nightly 用日期滚动种子拓新;
#   - 真分歧(byte-diff)与环境失败(oracle 不可用等)分流开 issue,不混信号;
#   - 撞出的分歧应经最小化回流为 conformance 用例(12 §3.6),回归不靠再次随机撞中。

on:
  schedule:
    - cron: '0 21 * * *' # 北京时间 05:00
  workflow_dispatch:
    inputs:
      rounds:
        description: 'random scripts per suite'
        default: '20000'
      gofuzztime:
        description: 'go-fuzz time per target'
        default: '10m'

permissions:
  contents: read
  issues: write

jobs:
  diff-fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: install lua 5.1.5 oracle (source build)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq libreadline-dev
          curl -sLO https://www.lua.org/ftp/lua-5.1.5.tar.gz
          tar xzf lua-5.1.5.tar.gz
          make -C lua-5.1.5 posix -j2
          sudo cp lua-5.1.5/src/lua /usr/local/bin/lua5.1
          ./scripts/check-oracle.sh

      - name: rolling-seed differential fuzz
        id: difffuzz
        run: |
          # 日期纪元作滚动种子基:每天一段新种子空间,失败可精确重放
          SEED_BASE=$(( $(date -u +%s) / 86400 * 100000 ))
          ROUNDS="${{ github.event.inputs.rounds || '20000' }}"
          echo "seed_base=$SEED_BASE" >> "$GITHUB_OUTPUT"
          echo "rounds=$ROUNDS" >> "$GITHUB_OUTPUT"
          set -o pipefail
          WANGSHU_FUZZ_SEED_BASE=$SEED_BASE WANGSHU_FUZZ_N=$ROUNDS \
            go test ./test/difftest/ -run 'TestDiff_RandomScripts' -timeout 300m -v 2>&1 | tee difffuzz.log

      - name: GC-stress transparency fuzz
        if: always()
        run: |
          set -o pipefail
          go test ./test/difftest/ -run 'TestGCStress' -timeout 60m 2>&1 | tee gcstress.log

      - name: native go-fuzz long run
        if: always()
        run: |
          set -o pipefail
          ./scripts/go-fuzz.sh "${{ github.event.inputs.gofuzztime || '10m' }}" 2>&1 | tee gofuzz.log

      - name: upload logs and crash corpus
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-fuzz-${{ github.run_id }}
          path: |
            difffuzz.log
            gcstress.log
            gofuzz.log
            **/testdata/fuzz/**
          if-no-files-found: ignore

      - name: triage and file divergence issue
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          SEED_BASE: ${{ steps.difffuzz.outputs.seed_base }}
          ROUNDS: ${{ steps.difffuzz.outputs.rounds }}
        run: |
          # 分流:oracle 供给失败(INFRA)vs 真分歧(DIVERGENCE)
          if grep -q "oracle run: " difffuzz.log 2>/dev/null && ! grep -q "byte-diff" difffuzz.log 2>/dev/null; then
            TITLE="difftest infra failure: oracle error ($(date -u +%F))"
            LABEL="ci"
            BODY="nightly difftest 因 oracle 环境失败中止(非真分歧)。日志见 run artifacts:${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else
            FIRST_SEED=$(grep -oP 'seed \K\d+(?= byte-diff)' difffuzz.log 2>/dev/null | head -1 || true)
            TITLE="difftest divergence: seed ${FIRST_SEED:-unknown} ($(date -u +%F))"
            LABEL="bug"
            BODY=$(cat <<EOF
          nightly 差分 fuzz 撞出与官方 Lua 5.1.5 的输出分歧(或 GC 透明性破坏/go-fuzz crash)。

          **本地复现**:
          \`\`\`bash
          # 差分分歧(精确种子重放)
          WANGSHU_FUZZ_SEED_BASE=${FIRST_SEED:-$SEED_BASE} WANGSHU_FUZZ_N=1 \\
            go test ./test/difftest/ -run TestDiff_RandomScripts -v
          # 本轮完整种子段
          WANGSHU_FUZZ_SEED_BASE=$SEED_BASE WANGSHU_FUZZ_N=$ROUNDS \\
            go test ./test/difftest/ -run TestDiff_RandomScripts
          \`\`\`

          **后续**(12 §3.6):最小化分歧脚本后回流为 conformance 用例,回归不依赖再次随机撞中。
          日志与 crash corpus 见 run artifacts:${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF
          )
          fi
          # 同标题去重:已有 open issue 则追加评论而非新开
          EXISTING=$(gh issue list --state open --search "in:title \"$TITLE\"" --json number --jq '.[0].number' || true)
          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            gh issue comment "$EXISTING" --body "再次触发:run ${{ github.run_id }}"
          else
            gh issue create --title "$TITLE" --label "$LABEL" --body "$BODY"
          fi
