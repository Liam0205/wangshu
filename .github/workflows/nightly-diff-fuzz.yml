name: nightly-diff-fuzz

# 长跑差分 + 自动开 issue(engineering.md §3.2):
#   - PR 门禁(ci.yml)用固定种子防回归;nightly 用日期滚动种子拓新;
#   - 真分歧(byte-diff)与环境失败(oracle 不可用等)分流开 issue,不混信号;
#   - 撞出的分歧应经最小化回流为 conformance 用例(12 §3.6),回归不靠再次随机撞中。

on:
  schedule:
    - cron: '0 21 * * *' # 北京时间 05:00
  workflow_dispatch:
    inputs:
      rounds:
        description: 'random scripts (oracle differential)'
        default: '2000000'
      gcstress:
        description: 'random scripts (GC stress dual-mode)'
        default: '200000'
      gofuzztime:
        description: 'go-fuzz time per target (4 targets)'
        default: '45m'

permissions:
  contents: read
  issues: write

jobs:
  diff-fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: install lua 5.1.5 oracle (source build)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq libreadline-dev
          curl -sLO https://www.lua.org/ftp/lua-5.1.5.tar.gz
          tar xzf lua-5.1.5.tar.gz
          make -C lua-5.1.5 posix -j2
          sudo cp lua-5.1.5/src/lua /usr/local/bin/lua5.1
          ./scripts/check-oracle.sh

      - name: rolling-seed differential fuzz
        id: difffuzz
        run: |
          # 日期纪元作滚动种子基:每天一段新种子空间,失败可精确重放。
          # 种子段间距 1e7,按每晚 200 万脚本(本地实测 ~1ms/脚本,约 35-60 分钟)留 5 倍余量。
          SEED_BASE=$(( $(date -u +%s) / 86400 * 10000000 ))
          ROUNDS="${{ github.event.inputs.rounds || '2000000' }}"
          echo "seed_base=$SEED_BASE" >> "$GITHUB_OUTPUT"
          echo "rounds=$ROUNDS" >> "$GITHUB_OUTPUT"
          set -o pipefail
          WANGSHU_FUZZ_SEED_BASE=$SEED_BASE WANGSHU_FUZZ_N=$ROUNDS \
            go test ./test/difftest/ -run 'TestDiff_RandomScripts' -timeout 150m 2>&1 | tee difffuzz.log

      - name: GC-stress transparency fuzz
        if: always()
        run: |
          set -o pipefail
          WANGSHU_GCSTRESS_N="${{ github.event.inputs.gcstress || '200000' }}" \
            go test ./test/difftest/ -run 'TestGCStress' -timeout 60m 2>&1 | tee gcstress.log

      - name: native go-fuzz long run
        if: always()
        run: |
          set -o pipefail
          ./scripts/go-fuzz.sh "${{ github.event.inputs.gofuzztime || '45m' }}" 2>&1 | tee gofuzz.log

      - name: upload logs and crash corpus
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nightly-fuzz-${{ github.run_id }}
          path: |
            difffuzz.log
            gcstress.log
            gofuzz.log
            **/testdata/fuzz/**
          if-no-files-found: ignore

      - name: triage and file divergence issue
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          SEED_BASE: ${{ steps.difffuzz.outputs.seed_base }}
          ROUNDS: ${{ steps.difffuzz.outputs.rounds }}
        run: |
          # 三档分流(机器可读标记 API,与测试侧约定):
          #   1. DIVERGENCE seed=<n> kind=<bytediff|gcstress|oracle-error>(差分/GC 透明性)→ bug
          #   2. go-fuzz crash:gofuzz.log 含 "Failing input written to <path>" → bug + crash corpus 路径
          #   3. 其它无标记失败(oracle 装不上、环境问题) → ci
          # 优先级:DIVERGENCE > go-fuzz crash > INFRA(同时撞中只开 1 个 issue,以 DIVERGENCE 为准)
          if grep -q "DIVERGENCE" difffuzz.log gcstress.log 2>/dev/null; then
            FIRST_SEED=$(grep -ohP 'DIVERGENCE seed=\K\d+' difffuzz.log gcstress.log 2>/dev/null | head -1 || true)
            FIRST_KIND=$(grep -ohP 'DIVERGENCE seed=\d+ kind=\K\S+' difffuzz.log gcstress.log 2>/dev/null | head -1 || true)
            TITLE="difftest divergence: seed ${FIRST_SEED:-unknown} kind ${FIRST_KIND:-unknown} ($(date -u +%F))"
            LABEL="bug"
            BODY=$(cat <<EOF
          nightly 差分 fuzz 撞出与官方 Lua 5.1.5 的输出分歧(或 GC 透明性破坏)。

          **本地复现**:
          \`\`\`bash
          # 差分分歧(精确种子重放)
          WANGSHU_FUZZ_SEED_BASE=${FIRST_SEED:-$SEED_BASE} WANGSHU_FUZZ_N=1 \\
            go test ./test/difftest/ -run TestDiff_RandomScripts -v
          # 本轮完整种子段
          WANGSHU_FUZZ_SEED_BASE=$SEED_BASE WANGSHU_FUZZ_N=$ROUNDS \\
            go test ./test/difftest/ -run TestDiff_RandomScripts
          \`\`\`

          **后续**(12 §3.6):最小化分歧脚本后回流为 conformance 用例,回归不依赖再次随机撞中。
          日志与 crash corpus 见 run artifacts:${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF
          )
          elif grep -q "Failing input written to" gofuzz.log 2>/dev/null; then
            CRASH_PATH=$(grep -ohP 'Failing input written to \K\S+' gofuzz.log 2>/dev/null | head -1 || true)
            CRASH_NAME=$(basename "$CRASH_PATH")
            TITLE="go-fuzz crash: ${CRASH_NAME:-unknown} ($(date -u +%F))"
            LABEL="bug"
            BODY=$(cat <<EOF
          nightly go-fuzz 长跑撞出 crash(子进程异常退出/死循环/panic)。corpus 已写入仓库
          \`testdata/fuzz/\` 路径,可本地精确重放定位根因。

          **crash corpus 路径**:\`$CRASH_PATH\`

          **本地复现**:
          \`\`\`bash
          # 从 run artifact 下载 corpus(若仓库还没入库)
          gh run download ${{ github.run_id }} --repo ${{ github.repository }}
          # 复制到对应路径
          cp nightly-fuzz-${{ github.run_id }}/$CRASH_PATH $CRASH_PATH
          # 重放
          go test . -run='${CRASH_NAME%/*}' -timeout 60s -v
          \`\`\`

          **后续**(12 §4.9 嵌入式 hardening 阈值纪律):定位触发 crash 的 stdlib/VM 路径,加 fail-fast 阈值;
          补回归用例入 \`hardening_test.go\`;crash corpus 留在 \`testdata/fuzz/\` 作常驻回归。
          日志与 crash corpus 见 run artifacts:${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF
          )
          else
            TITLE="nightly-fuzz infra failure ($(date -u +%F))"
            LABEL="ci"
            BODY="nightly fuzz 失败但无 DIVERGENCE 标记 / 无 go-fuzz crash(环境/基础设施类:oracle 不可用、超时、依赖装不上等)。日志见 run artifacts:${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          # 同标题去重:已有 open issue 则追加评论而非新开
          EXISTING=$(gh issue list --state open --search "in:title \"$TITLE\"" --json number --jq '.[0].number' || true)
          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            gh issue comment "$EXISTING" --body "再次触发:run ${{ github.run_id }}"
          else
            gh issue create --title "$TITLE" --label "$LABEL" --body "$BODY"
          fi
