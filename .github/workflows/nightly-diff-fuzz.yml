name: nightly-diff-fuzz

# Long-running differential fuzz + automatic issue filing (engineering.md §3.2):
#   - The PR gate (ci.yml) uses fixed seeds against regressions; this workflow
#     explores new ground with hourly rolling seeds;
#   - Real divergences (byte-diff) and environment failures (oracle
#     unavailable, ...) are filed as separate issues, keeping signals apart;
#   - Divergences it hits should be minimized and folded back into conformance
#     cases (12 §3.6) so regression coverage does not rely on randomly hitting
#     them again.

on:
  schedule:
    # One round every 4 hours (6/day; raised from daily on 2026-07-10).
    # A round's wall-clock is ~3h40m, and a brief overlap with the next
    # round on an extremely slow run is harmless: concurrent runs land in
    # different hour buckets (different SEED_BASE, so seed segments never
    # clash), issues are deduped by title, and the only cost is a brief 2x
    # runner occupancy -- the interval is a budget choice, not an
    # anti-overlap constraint. The seed space rolls by hour epoch (see
    # SEED_BASE); each round explores a different segment, so more
    # frequency means more coverage.
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      rounds:
        description: 'random scripts (oracle differential)'
        default: '2000000'
      gcstress:
        description: 'random scripts (GC stress dual-mode)'
        default: '200000'
      gofuzztime:
        description: 'go-fuzz time per target (4 targets)'
        default: '45m'

permissions:
  contents: read
  issues: write

jobs:
  diff-fuzz:
    # Matrix covers: p1 = crescent (new-moon) interpreter path;
    #                p3 = gibbous wasm (P3) promoted path;
    #                p4 = gibbous jit (P4) native promoted path (added 2026-07-01
    #                     to close V21 30-day longevity + V22 30-day guard-omission
    #                     accumulation for P4; see docs/design/p4-method-jit/
    #                     08-testing-strategy.md V21/V22).
    # All three build tiers share the same fuzz input corpus but exercise
    # different VM paths -- rolling-seed diff + GC-stress + go-fuzz native long
    # run guard byte-equal / no-crash for each tier every night.
    strategy:
      fail-fast: false # a build hitting divergence does not stop others from continuing
      matrix:
        include:
          - variant: p1
            tags: ''
          - variant: p3
            tags: 'wangshu_p3 wangshu_profile'
          - variant: p4
            tags: 'wangshu_p4 wangshu_profile'
    name: diff-fuzz (${{ matrix.variant }})
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: install lua 5.1.5 oracle (source build)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq libreadline-dev
          curl -sLO https://www.lua.org/ftp/lua-5.1.5.tar.gz
          tar xzf lua-5.1.5.tar.gz
          make -C lua-5.1.5 posix -j2
          sudo cp lua-5.1.5/src/lua /usr/local/bin/lua5.1
          ./scripts/check-oracle.sh

      - name: rolling-seed differential fuzz (${{ matrix.variant }})
        id: difffuzz
        run: |
          # Hour epoch as rolling seed base (2026-07-10, was day epoch —
          # required by the 6x/day schedule: a day epoch would make all
          # six daily runs re-explore the same segment). Fresh seed space
          # each run; the seed for a failing run replays
          # deterministically. Seed segment stride 1e7, sized for 2M
          # scripts/run (~1ms/script locally, 35-60 min) with 5x safety
          # headroom; consecutive hour buckets never overlap (2M << 1e7).
          # p3 (wazero init + promotion + wasm dispatch) and p4 (jit mmap
          # + native emit + trampoline) may be slightly slower than p1;
          # the 150m timeout absorbs both.
          SEED_BASE=$(( $(date -u +%s) / 3600 * 10000000 ))
          ROUNDS="${{ github.event.inputs.rounds || '2000000' }}"
          echo "seed_base=$SEED_BASE" >> "$GITHUB_OUTPUT"
          echo "rounds=$ROUNDS" >> "$GITHUB_OUTPUT"
          set -o pipefail
          TAGS_ARG=""
          if [ -n "${{ matrix.tags }}" ]; then
            TAGS_ARG="-tags \"${{ matrix.tags }}\""
          fi
          eval WANGSHU_FUZZ_SEED_BASE=$SEED_BASE WANGSHU_FUZZ_N=$ROUNDS \
            go test $TAGS_ARG ./test/difftest/ -run 'TestDiff_RandomScripts' -timeout 150m 2>&1 | tee difffuzz.log

      - name: GC-stress transparency fuzz (${{ matrix.variant }})
        if: always()
        run: |
          set -o pipefail
          TAGS_ARG=""
          if [ -n "${{ matrix.tags }}" ]; then
            TAGS_ARG="-tags \"${{ matrix.tags }}\""
          fi
          eval WANGSHU_GCSTRESS_N="${{ github.event.inputs.gcstress || '200000' }}" \
            go test $TAGS_ARG ./test/difftest/ -run 'TestGCStress' -timeout 60m 2>&1 | tee gcstress.log

      # AUTO-mode rolling-seed diff (p3/p4 only; no-op match on p1).
      # Production runs auto, not force-all: this leg drives the
      # natural-heat promotion decision chain (threshold crossing
      # mid-run, runtime compilability recheck, profitability gate,
      # short-proto floor + exemption) via lowered thresholds and
      # diffs every run against the same-build interpreter baseline.
      - name: auto-mode rolling-seed diff (${{ matrix.variant }})
        if: always() && matrix.tags != ''
        run: |
          set -o pipefail
          # Hour epoch, same formula as the main leg. This step starts
          # later in the same job, so the recompute may land in the next
          # hour bucket — harmless: each leg's replay only needs its own
          # SEED_BASE, and the auto leg exploring a different segment
          # from the main leg costs nothing.
          SEED_BASE=$(( $(date -u +%s) / 3600 * 10000000 ))
          ROUNDS="${{ github.event.inputs.rounds || '2000000' }}"
          # Auto leg runs each seed 3x (baseline + 2 auto runs): third
          # of the rounds keeps wall-clock comparable to the main leg.
          AUTO_ROUNDS=$(( ROUNDS / 3 ))
          # No eval here (issue #81): eval re-parses the command line and
          # strips the -tags quoting, splitting "wangshu_p3 wangshu_profile"
          # into a tag + a bogus package argument. The main legs need eval
          # for their possibly-empty TAGS_ARG; this step is gated on
          # matrix.tags != '' so a plain invocation is correct.
          WANGSHU_FUZZ_SEED_BASE=$SEED_BASE WANGSHU_FUZZ_N=$AUTO_ROUNDS \
            go test -tags "${{ matrix.tags }}" ./test/difftest/ -run 'TestAuto_RandomScripts' -timeout 150m 2>&1 | tee autodiff.log

      - name: native go-fuzz long run (${{ matrix.variant }})
        if: always()
        run: |
          set -o pipefail
          ./scripts/go-fuzz.sh "${{ github.event.inputs.gofuzztime || '45m' }}" "${{ matrix.tags }}" 2>&1 | tee gofuzz.log

      # cgo oracle differential go-fuzz (p1 leg only): the embedded
      # official 5.1.5 diffs against the interpreter tier -- P1 is the
      # semantic anchor; p3/p4 close the loop against P1 via the
      # existing three-way difftests above. Unlike the rolling-seed
      # leg (well-formed generator scripts), go-fuzz mutates arbitrary
      # source bytes, covering irregular/adversarial shapes. Crashes
      # land in gofuzz-triage via the same "Failing input written to"
      # marker, so the log is appended to gofuzz.log's triage scope.
      # The FuzzOracleDiff filter is required: build tags are additive,
      # so the cgo build also compiles every default-build target and
      # an unfiltered sweep re-runs all of them (5 x 45m blew past the
      # 350m job timeout and the p1 leg got cancelled silently).
      - name: oracle-diff go-fuzz long run (p1 vs embedded 5.1.5)
        if: always() && matrix.variant == 'p1'
        run: |
          set -o pipefail
          CGO_ENABLED=1 ./scripts/go-fuzz.sh \
            "${{ github.event.inputs.gofuzztime || '45m' }}" \
            "wangshu_oracle_cgo" FuzzOracleDiff 2>&1 | tee oraclefuzz.log

      - name: upload logs and crash corpus
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nightly-fuzz-${{ matrix.variant }}-${{ github.run_id }}
          path: |
            difffuzz.log
            gcstress.log
            autodiff.log
            gofuzz.log
            oraclefuzz.log
            **/testdata/fuzz/**
            **/fuzz-forensics/**
          if-no-files-found: ignore

      - name: triage and file divergence issue
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          SEED_BASE: ${{ steps.difffuzz.outputs.seed_base }}
          ROUNDS: ${{ steps.difffuzz.outputs.rounds }}
        run: |
          # Three-way triage (machine-readable marker API, agreed with the test side):
          #   1. DIVERGENCE seed=<n> kind=<bytediff|gcstress|oracle-error> (diff / GC transparency) -> bug
          #   2. go-fuzz crash: gofuzz.log contains "Failing input written to <path>" -> bug + crash corpus path
          #   3. any other unmarked failure (oracle install failure, environment issues) -> ci
          # Priority: DIVERGENCE > go-fuzz crash > INFRA (only 1 issue is filed when several hit at once, DIVERGENCE wins)
          if grep -q "DIVERGENCE" difffuzz.log gcstress.log autodiff.log 2>/dev/null; then
            FIRST_SEED=$(grep -ohP 'DIVERGENCE seed=\K\d+' difffuzz.log gcstress.log autodiff.log 2>/dev/null | head -1 || true)
            FIRST_KIND=$(grep -ohP 'DIVERGENCE seed=\d+ kind=\K\S+' difffuzz.log gcstress.log autodiff.log 2>/dev/null | head -1 || true)
            TITLE="difftest divergence (${{ matrix.variant }}): seed ${FIRST_SEED:-unknown} kind ${FIRST_KIND:-unknown} ($(date -u +%F))"
            LABEL="bug"
            BODY=$(cat <<EOF
          nightly 差分 fuzz 撞出与官方 Lua 5.1.5 的输出分歧(或 GC 透明性破坏)。

          **本地复现**:
          \`\`\`bash
          # 差分分歧(精确种子重放)
          WANGSHU_FUZZ_SEED_BASE=${FIRST_SEED:-$SEED_BASE} WANGSHU_FUZZ_N=1 \\
            go test ./test/difftest/ -run TestDiff_RandomScripts -v
          # 本轮完整种子段
          WANGSHU_FUZZ_SEED_BASE=$SEED_BASE WANGSHU_FUZZ_N=$ROUNDS \\
            go test ./test/difftest/ -run TestDiff_RandomScripts
          \`\`\`

          **后续**(12 §3.6):最小化分歧脚本后回流为 conformance 用例,回归不依赖再次随机撞中。
          日志与 crash corpus 见 run artifacts:${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF
          )
          elif grep -q "Failing input written to" gofuzz.log oraclefuzz.log 2>/dev/null; then
            CRASH_PATH=$(grep -ohP 'Failing input written to \K\S+' gofuzz.log oraclefuzz.log 2>/dev/null | head -1 || true)
            CRASH_NAME=$(basename "$CRASH_PATH")
            # Fuzz target = the path segment above the corpus hash
            # (testdata/fuzz/<FuzzTarget>/<hash>) — needed for an exact
            # -run pattern. The old template ran the bare hash with no
            # target prefix and no build tags, matching nothing
            # ("no tests to run"; PR #126 review finding).
            CRASH_TARGET=$(basename "$(dirname "$CRASH_PATH")")
            case "$CRASH_TARGET" in
              # oracle-diff crashers replay under the cgo oracle build,
              # regardless of the matrix leg that caught them.
              FuzzOracleDiff) REPLAY_TAGS='wangshu_oracle_cgo' ;;
              *) case "${{ matrix.variant }}" in
                   p3) REPLAY_TAGS='wangshu_p3 wangshu_profile' ;;
                   p4) REPLAY_TAGS='wangshu_p4 wangshu_profile' ;;
                   *)  REPLAY_TAGS='' ;;
                 esac ;;
            esac
            TITLE="go-fuzz crash (${{ matrix.variant }}): ${CRASH_NAME:-unknown} ($(date -u +%F))"
            LABEL="bug"
            BODY=$(cat <<EOF
          nightly go-fuzz 长跑撞出 crash(子进程异常退出/死循环/panic)。corpus 已写入仓库
          \`testdata/fuzz/\` 路径,可本地精确重放定位根因。

          **crash corpus 路径**:\`$CRASH_PATH\`

          **本地复现**:
          \`\`\`bash
          # 从 run artifact 下载 corpus(若仓库还没入库)
          gh run download ${{ github.run_id }} --repo ${{ github.repository }}
          # 复制到对应路径
          cp nightly-fuzz-${{ matrix.variant }}-${{ github.run_id }}/$CRASH_PATH $CRASH_PATH
          # replay (tags match the crashed target; FuzzOracleDiff needs CGO_ENABLED=1)
          go test${REPLAY_TAGS:+ -tags "$REPLAY_TAGS"} . \\
            -run="^${CRASH_TARGET}/${CRASH_NAME}\$" -count=1 -timeout 60s -v
          \`\`\`

          **后续**(12 §4.9 嵌入式 hardening 阈值纪律):定位触发 crash 的 stdlib/VM 路径,加 fail-fast 阈值;
          补回归用例;corpus 入库位置按 llmdoc/guides/unreproducible-crasher-triage.md 的判据选
          (轻量 budget-bounded 形状 → \`testdata/fuzz/\` 常驻回归;重 workload → 显式回归测试,防
          fuzz coordinator 并行重放压垮 worker)。
          日志与 crash corpus 见 run artifacts:${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF
          )
          else
            TITLE="nightly-fuzz infra failure (${{ matrix.variant }}, $(date -u +%F))"
            LABEL="ci"
            BODY="nightly fuzz 失败但无 DIVERGENCE 标记 / 无 go-fuzz crash(环境/基础设施类:oracle 不可用、超时、依赖装不上等)。日志见 run artifacts:${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          # Dedupe by title: comment on an existing open issue instead of filing a new one
          EXISTING=$(gh issue list --state open --search "in:title \"$TITLE\"" --json number --jq '.[0].number' || true)
          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            gh issue comment "$EXISTING" --body "再次触发:run ${{ github.run_id }}"
          else
            gh issue create --title "$TITLE" --label "$LABEL" --body "$BODY"
          fi
